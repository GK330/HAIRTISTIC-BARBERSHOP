<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | Hairtistic Barber</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box {
            background: #1a1a1c; padding: 40px; border-radius: 25px;
            border: 1px solid rgba(197, 160, 89, 0.3); /* Bordure dorée légère */
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .login-box input {
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: #000; color: white; outline: none;
        }
        .login-box input:focus { border-color: var(--gold); }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 style="color: white; margin-bottom: 5px; font-weight: 800; letter-spacing: 2px;">HAIRTISTIC</h2>
        <p style="color: var(--gold); margin-bottom: 30px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px;">Espace Manager</p>
        
        <form id="login-form">
            <input type="email" id="admin-email" required placeholder="Adresse E-mail">
            <input type="password" id="admin-password" required placeholder="Mot de passe">
            <button type="submit" style="width: 100%; background: var(--gold); color: black; padding: 15px; border: none; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s;">
                SE CONNECTER
            </button>
        </form>
        <a href="../index.html" style="display: block; margin-top: 20px; color: #a1a1aa; text-decoration: none; font-size: 0.9rem;">← Retour au site</a>
    </div>

    <script type="module" src="../script.js"></script>
</body>
</html>
