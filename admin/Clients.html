<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairtistic Barber | Répertoire Clients</title>
     <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <span class="logo-dot"></span>
                <h1>HAIRTISTIC</h1>
            </div>
            <nav class="menu">
                <a href="Dashboard.html" class="menu-item">Tableau de bord</a>
                <a href="caisse.html" class="menu-item">Ventes & Caisse</a>
                <a href="depense.html" class="menu-item">Dépenses</a>
                <a href="stocks.html" class="menu-item">Stocks Produits</a>
                <a href="clients.html" class="menu-item active">Répertoire Clients</a>
                <a href="stats.html" class="menu-item">Statistiques & Finances</a>
            </nav>
            <div class="sidebar-footer">
                <p>Lomé, Togo</p>
            </div>
        </aside>

        <main class="content">
            <header class="main-header">
                <button class="menu-burger" onclick="toggleSidebar()">☰</button>
                <div class="header-text">
                    <h2>RÉPERTOIRE CLIENTS</h2>
                    <p>Gère tes clients et fidélise-les.</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="toggleModal('modal-add-client')">+ Nouveau Client</button>
                </div>
            </header>

            <section class="data-section">
                <div class="section-header">
                    <h3>Liste des Clients</h3>
                    <input type="text" id="search-client-db" placeholder="Rechercher un nom..." onkeyup="filterClients()" style="padding: 8px 15px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nom Complet</th>
                                <th>Sexe</th>
                                <th>Numéro de Tél</th>
                                <th>Quartier / Loc.</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="clients-table">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-add-client" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Ajouter un client</h3>
                <span class="close" onclick="toggleModal('modal-add-client')">&times;</span>
            </div>
            <form id="client-add-form">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="new-client-name" required placeholder="Ex: Jean Dupont">
                </div>
                <div class="form-group">
                    <label>Sexe</label>
                    <select id="new-client-sex" required>
                        <option value="Homme">Homme</option>
                        <option value="Femme">Femme</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Numéro de téléphone</label>
                    <input type="tel" id="new-client-phone" required placeholder="Ex: 90 00 00 00">
                </div>
                <div class="form-group">
                    <label>Quartier</label>
                    <input type="text" id="new-client-loc" required placeholder="Ex: Adidogomé">
                </div>
                <button type="submit" class="btn btn-full">Enregistrer le client</button>
            </form>
        </div>
    </div>

    <div id="modal-edit-client" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Compléter les infos</h3>
                <span class="close" onclick="toggleModal('modal-edit-client')">&times;</span>
            </div>
            <form id="client-edit-form">
                <input type="hidden" id="edit-client-id">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="edit-client-name" required>
                </div>
                <div class="form-group">
                    <label>Sexe</label>
                    <select id="edit-client-sex" required>
                        <option value="Homme">Homme</option>
                        <option value="Femme">Femme</option>
                        <option value="Non précisé">Non précisé</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Numéro de téléphone</label>
                    <input type="tel" id="edit-client-phone" required placeholder="Ex: 90 00 00 00">
                </div>
                <div class="form-group">
                    <label>Quartier</label>
                    <input type="text" id="edit-client-loc" required placeholder="Ex: Adidogomé">
                </div>
                <button type="submit" class="btn btn-full" style="background: var(--gold); color: black;">Mettre à jour</button>
            </form>
        </div>
    </div>

<script type="module" src="../script.js"></script>
<div id="sidebar-backdrop" onclick="toggleSidebar()"></div>
</body>
</html>
