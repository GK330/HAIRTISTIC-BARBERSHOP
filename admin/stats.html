<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques & Finances | Hairtistic Barber</title>
    <link rel="stylesheet" href="../style.css">    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .bi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand"><span class="logo-dot"></span><h1>HAIRTISTIC</h1></div>
            <nav class="menu">
                <a href="Dashboard.html" class="menu-item">Tableau de bord</a>
                <a href="caisse.html" class="menu-item">Ventes & Caisse</a>
                <a href="depense.html" class="menu-item">Dépenses</a>
                <a href="stocks.html" class="menu-item">Stocks Produits</a>
                <a href="clients.html" class="menu-item">Répertoire Clients</a>
                <a href="stats.html" class="menu-item active">Statistiques & Finances</a>
            </nav>
            <div class="sidebar-footer"><p>Lomé, Togo</p></div>
        </aside>

        <main class="content">
            <header class="main-header" style="justify-content: space-between;">
                <div class="header-text">
                    <h2>Business Intelligence</h2>
                    <p>Vision globale des finances et de la croissance du salon.</p>
                </div>
            </header>

            <section class="bi-grid">
                <div class="stat-card" style="border-top: 3px solid var(--gold);">
                    <label>Chiffre d'Affaires (CA)</label>
                    <div class="value" id="grand-total" style="color: var(--gold);">0 F</div>
                </div>
                <div class="stat-card" style="border-top: 3px solid #ff4d4d;">
                    <label>Dépenses Totales</label>
                    <div class="value" id="total-expenses" style="color: #ff4d4d;">0 F</div>
                </div>
                <div class="stat-card dark" style="border-top: 3px solid #4ade80;">
                    <label>Bénéfice Net</label>
                    <div class="value" id="net-profit" style="color: #4ade80;">0 F</div>
                </div>
                <div class="stat-card">
                    <label>Total Clients</label>
                    <div class="value" id="stat-clients-count">0</div>
                </div>
                <div class="stat-card">
                    <label>Total Produits</label>
                    <div class="value" id="stat-products-count">0</div>
                </div>
                <div class="stat-card">
                    <label>Panier Moyen</label>
                    <div class="value" id="avg-client">0 F</div>
                </div>
            </section>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px; margin-top: 30px;">
                <div class="table-container" style="padding: 30px;">
                    <h3>Évolution des Revenus (7 derniers jours)</h3>
                    <canvas id="revenueChart"></canvas>
                </div>
                <div class="table-container" style="padding: 30px;">
                    <h3>Top Services</h3>
                    <canvas id="servicesChart"></canvas>
                </div>
            </div>
        </main>
    </div>

<script type="module" src="../script.js"></script>
<div id="sidebar-backdrop" onclick="toggleSidebar()"></div>
</body>
</html>
