<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dépenses | Hairtistic Barber</title>
    <link rel="stylesheet" href="../style.css">    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand"><span class="logo-dot"></span><h1>HAIRTISTIC</h1></div>
            <nav class="menu">
                <a href="Dashboard.html" class="menu-item">Tableau de bord</a>
                <a href="caisse.html" class="menu-item">Ventes & Caisse</a>
                <a href="depense.html" class="menu-item active">Dépenses</a>
                <a href="stocks.html" class="menu-item">Stocks Produits</a>
                <a href="clients.html" class="menu-item">Répertoire Clients</a>
                <a href="stats.html" class="menu-item">Statistiques & Finances</a>
            </nav>
            <div class="sidebar-footer"><p>Lomé, Togo</p></div>
        </aside>

        <main class="content">
            <header class="main-header" style="justify-content: space-between;">
                <div class="header-text">
                    <h2>Gestion des Dépenses</h2>
                    <p>Suivi détaillé de vos charges et frais</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="toggleModal('modal-depense')" style="background: #ff4d4d; color: white; border: none;">+ Nouvelle Dépense</button>
                </div>
            </header>

            <section class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Heure</th>
                            <th>Description</th>
                            <th>Catégorie</th>
                            <th>Montant</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenses-table">
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="modal-depense" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="color: #ff4d4d;">Enregistrer une dépense</h3>
                <span class="close" onclick="toggleModal('modal-depense')">&times;</span>
            </div>
            <form id="expense-form">
                <div class="form-group">
                    <label>Description (ex: Achat tondeuse, Loyer...)</label>
                    <input type="text" id="exp-desc" required placeholder="Motif de la dépense">
                </div>
                <div class="form-group">
                    <label>Catégorie</label>
                    <select id="exp-category" required>
                        <option value="Matériel">Matériel & Produits</option>
                        <option value="Loyer">Loyer</option>
                        <option value="Factures">Factures (Eau, Électricité...)</option>
                        <option value="Salaires">Salaires</option>
                        <option value="Marketing">Marketing / Pub</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Montant (FCFA)</label>
                    <input type="number" id="exp-amount" required placeholder="10000">
                </div>
                <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>Date</label>
                        <input type="date" id="exp-date" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>Heure</label>
                        <input type="time" id="exp-time" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                    </div>
                </div>
                <button type="submit" class="btn btn-full" style="background: #ff4d4d; color: white; border: none;">Valider la dépense</button>
            </form>
        </div>
    </div>

<script type="module" src="../script.js"></script>
<div id="sidebar-backdrop" onclick="toggleSidebar()"></div>
</body>
</html>
